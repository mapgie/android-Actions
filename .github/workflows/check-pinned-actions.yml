name: Check pinned action versions

on:
  schedule:
    # Weekly, Monday 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0

      - name: Check pinned actions in composite actions
        id: check
        run: |
          set +e
          python3 scripts/check_pinned_actions.py
          echo "status=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Open or update tracking issue
        if: steps.check.outputs.status != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Action pins in .github/actions are out of date"
          EXISTING=$(gh issue list --state open --search "in:title \"$TITLE\"" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --body-file outdated.md
          else
            gh issue create --title "$TITLE" --body-file outdated.md
          fi

      - name: Close stale tracking issue
        if: steps.check.outputs.status == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Action pins in .github/actions are out of date"
          EXISTING=$(gh issue list --state open --search "in:title \"$TITLE\"" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --comment "All pinned actions in .github/actions are now up to date."
          fi
