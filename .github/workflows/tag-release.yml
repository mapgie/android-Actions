name: Tag release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag, in the form X.Y.Z (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate version input
        run: |
          VERSION="${{ inputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version '$VERSION'. Expected format X.Y.Z, e.g. 1.0.0"
            exit 1
          fi

      - name: Create and push tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          MAJOR="${VERSION%%.*}"
          FULL_TAG="v${VERSION}"
          MAJOR_TAG="v${MAJOR}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$FULL_TAG" -m "Release $FULL_TAG"
          git tag -fa "$MAJOR_TAG" -m "Update $MAJOR_TAG to $FULL_TAG"

          git push origin "$FULL_TAG"
          git push origin "$MAJOR_TAG" --force
