name: Changelog bump check

on:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
        with:
          fetch-depth: 0

      - name: Check for a changelog fragment
        run: python3 check_changelog_fragment.py origin/${{ github.base_ref }}
