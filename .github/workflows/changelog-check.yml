name: Changelog bump check

on:
  workflow_call:
    inputs:
      mode:
        description: >
          "fragment" runs check_changelog_fragment.py against changelog/unreleased/
          (choreDash-Android, GoFlo style). "file" checks that CHANGELOG.md itself
          was updated (Android-App-Template style).
        required: false
        type: string
        default: fragment

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check for a changelog fragment
        if: inputs.mode == 'fragment'
        run: python3 check_changelog_fragment.py origin/${{ github.base_ref }}

      - name: Fail if CHANGELOG.md was not updated
        if: inputs.mode == 'file'
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          if echo "$CHANGED" | grep -q "^CHANGELOG.md$"; then
            echo "CHANGELOG.md was updated alongside code changes."
          else
            echo "::error::Code was changed but CHANGELOG.md was not updated. Add a changelog entry in CHANGELOG.md before merging."
            exit 1
          fi
