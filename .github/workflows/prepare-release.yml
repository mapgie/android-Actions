name: Prepare release

on:
  workflow_call:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0

      - name: Consolidate changelog fragments
        id: consolidate
        run: |
          set +e
          OUTPUT=$(python3 consolidate_changelog.py)
          STATUS=$?
          set -e
          echo "$OUTPUT"
          if [ "$STATUS" -ne 0 ]; then
            exit 1
          fi
          if echo "$OUTPUT" | grep -q '^status=no_fragments'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "version=$(echo "$OUTPUT" | grep '^version=' | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Open release PR
        if: steps.consolidate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.consolidate.outputs.version }}"
          BRANCH="release/v${VERSION}"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null; then
            echo "::error::Branch $BRANCH already exists. There is likely already an open release PR. Merge or close it before running this workflow again."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add CHANGELOG.md app/build.gradle.kts changelog/unreleased
          git commit -m "Release v${VERSION}"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "Release v${VERSION}" \
            --body "Consolidates pending changelog fragments and bumps the app version to v${VERSION}. CI will build, test, and lint this PR before it can be merged."
